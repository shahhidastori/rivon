services:
  - type: web
    name: hotel-booking-platform
    runtime: node
    plan: free
    buildCommand: npm ci && npm run db:prod:push && npm run build:render
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://hotel-booking-platform.onrender.com
      - key: AUTO_SEED
        value: "true"
